<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSA Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f4f0;color:#1a1a18;font-size:15px;line-height:1.5}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.75rem}
h1{font-size:20px;font-weight:500}
.meta{font-size:13px;color:#73726c}
.badge{background:#e1f5ee;color:#0f6e56;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.tab{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #d3d1c7;background:transparent;color:#5f5e5a}
.tab.active{background:#1a1a18;color:#fff;border-color:transparent}
.sec{font-size:11px;font-weight:500;color:#888780;letter-spacing:.06em;text-transform:uppercase;margin:1.75rem 0 .75rem}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:.5rem}
.kpi{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:14px 16px}
.kpi-l{font-size:12px;color:#73726c;margin-bottom:6px}
.kpi-v{font-size:24px;font-weight:500;line-height:1}
.kpi-v.bad{color:#a32d2d}
.kpi-s{font-size:11px;color:#aaa;margin-top:5px}
.pt{margin-top:8px;background:#eee;border-radius:4px;height:4px;overflow:hidden}
.pb{height:4px;border-radius:4px}
.ok{background:#1d9e75}.warn{background:#ef9f27}.bad2{background:#e24b4a}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:640px){.row{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:18px}
.card h3{font-size:13px;font-weight:500;margin-bottom:14px}
.cw{position:relative;width:100%;height:200px}
.cws{position:relative;width:100%;height:170px}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:12px;color:#5f5e5a}
.leg span{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.tc{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:18px;margin-bottom:14px;overflow-x:auto}
.tc h3{font-size:13px;font-weight:500;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-weight:500;color:#73726c;text-align:left;padding:5px 8px;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #f0ede8}
tr:last-child td{border-bottom:none}
.pill{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:500}
.pg{color:#0f6e56;background:#e1f5ee}.pa{color:#854f0b;background:#faeeda}.pr{color:#a32d2d;background:#fcebeb}.pn{color:#73726c;background:#eee}
footer{font-size:12px;color:#aaa;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
.loading{text-align:center;padding:4rem;color:#888;font-size:14px}
.ebox{background:#fcebeb;color:#a32d2d;border-radius:10px;padding:1.5rem;margin:1rem 0;font-size:13px;line-height:1.7}
</style>
</head>
<body>
<div class="page">
<header>
  <div><h1>KSA igakuine ulevaade</h1><div class="meta" id="mt">Laeb...</div></div>
  <span class="badge">Live andmed</span>
</header>
<div class="tabs" id="tabs"></div>
<div id="main"><div class="loading">Laeb Google Sheetsist...</div></div>
</div>
<script>
const URL2 = 'https://script.google.com/macros/s/AKfycbzjwUVhxWHwzqOjFwa4OY5yPRCcvGoTTID0mFfm0dZURVvs73laKbDgJn8d06Mz-8Wy/exec';
const MONTHS = [{k:'aprill',l:'Aprill 2026'},{k:'marts',l:'Marts 2026'},{k:'veebruar',l:'Veebruar 2026'},{k:'jaanuar',l:'Jaanuar 2026'}];
const WL = {aprill:['01-05.04','06-12.04','13-19.04','20-26.04','27-30.04'],marts:['01-02.03','03-09.03','10-16.03','17-23.03','24-31.03'],veebruar:['01-02.02','03-09.02','10-16.02','17-23.02','24-28.02'],jaanuar:['01-05.01','06-12.01','13-19.01','20-26.01','27-31.01']};
let ch={},lk=MONTHS[0].k,cache={};

function tabs(){document.getElementById('tabs').innerHTML=MONTHS.map(m=>`<button class="tab ${m.k===lk?'active':''}" onclick="sw('${m.k}')">${m.l}</button>`).join('')}
async function sw(k){lk=k;tabs();await load(k)}
function f(v,p=false){if(v==null)return'-';if(p){const n=parseFloat(v);return isNaN(n)?'-':Math.round(n*100)/100+'%'}return typeof v==='number'?Math.round(v*100)/100:v}
function pn(v){if(v==null)return null;const n=parseFloat(String(v).replace('%',''));return isNaN(n)?null:n}
function pc(p){const n=pn(p);if(n==null)return'pn';return n>=75?'pg':n>=50?'pa':'pr'}
function pp(v,e){if(!e||!v)return 0;return Math.min(Math.round(v/e*100),100)}
function bc(p){return p>=75?'ok':p>=50?'warn':'bad2'}

async function load(k){
  Object.values(ch).forEach(x=>x.destroy());ch={};
  document.getElementById('main').innerHTML='<div class="loading">Laeb andmeid...</div>';
  try{
    if(cache[k]){render(cache[k],k);return}
    const res=await fetch(URL2+'?month='+encodeURIComponent(k));
    const j=await res.json();
    if(!j.ok)throw new Error(j.error||'Viga');
    cache[k]=j.data;render(j.data,k);
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="ebox"><strong>Viga andmete laadimisel</strong><br>${e.message}<br><br>Kontrolli et Apps Script on avalikustatud: Deploy > Web App > Anyone.</div>`;
  }
}

function kpiHtml(d){
  const p=d.protseduurid,u=d.uuringud,b=d.broneeringud,o=d.optometristid;
  const items=[
    {l:'Flow protseduurid',v:p.flow_kokku.kokku,e:p.flow_kokku.eesmark,t:p.flow_kokku.tn},
    {l:'Flow uuringud',v:u.flow_teostatud.kokku,e:u.flow_teostatud.eesmark,t:u.flow_teostatud.tn},
    {l:'Lasteuuringud',v:u.lasteuuringud.kokku,e:u.lasteuuringud.eesmark,t:u.lasteuuringud.tn},
    {l:'Audit uuringud',v:u.audit.kokku,e:u.audit.eesmark,t:u.audit.tn},
    {l:'Rexon Eye',v:u.rexon.kokku,e:u.rexon.eesmark,t:u.rexon.tn},
    {l:'Online broneeringud',v:b.online_kokku.kokku,e:b.online_kokku.eesmark,t:b.online_kokku.tn},
    {l:'Lilia konesest bronnid',v:b.lilia_kone.kokku,e:b.lilia_kone.eesmark,t:b.lilia_kone.tn},
    {l:'Tyhistatud uuringud',v:u.tyhistatud.kokku,warn:true},
    {l:'Kirja % (uldine)',v:f(o.kirja_uldine.kokku,true),e:f(o.kirja_uldine.eesmark,true),txt:true},
    {l:'Kirja % (PP)',v:f(o.kirja_pp.kokku,true),e:f(o.kirja_pp.eesmark,true),txt:true},
  ];
  return items.map(it=>{
    const pv=it.e&&!it.txt?pp(it.v,it.e):null;
    const bc2=pv!=null?bc(pv):'';
    const tn=it.t?`<div class="kpi-s">Toenaosus: <strong>${f(it.t,true)}</strong></div>`:'';
    const pr=pv!=null?`<div class="kpi-s">${pv}% eesmargist</div><div class="pt"><div class="pb ${bc2}" style="width:${pv}%"></div></div>`:it.e?`<div class="kpi-s">Eesmark: ${f(it.e)}</div>`:'';
    return `<div class="kpi"><div class="kpi-l">${it.l}</div><div class="kpi-v${it.warn?' bad':''}">${f(it.v)}</div>${tn}${pr}</div>`;
  }).join('');
}

function render(d,k){
  const m=d.meta,p=d.protseduurid,u=d.uuringud,b=d.broneeringud,o=d.optometristid;
  document.getElementById('mt').textContent=`${m.leht} - ${m.toopaeva_nr}. toopaev / ${m.toopaevi_kuus}-st`;
  const wk=WL[k]||WL.aprill;
  const cd={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}},y:{ticks:{color:'#888',font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}}}};

  const opto=o.isikud.map(i=>`<tr><td>${i.nimi}</td><td>${f(i.prots)}</td><td>${f(i.kirja,true)}</td><td>${f(i.kirja_pp,true)}</td></tr>`).join('');
  const goals=[
    {n:'Flow protseduurid',v:p.flow_kokku.kokku,e:p.flow_kokku.eesmark,t:p.flow_kokku.tn},
    {n:'Flow uuringud',v:u.flow_teostatud.kokku,e:u.flow_teostatud.eesmark,t:u.flow_teostatud.tn},
    {n:'Lasteuuringud',v:u.lasteuuringud.kokku,e:u.lasteuuringud.eesmark,t:u.lasteuuringud.tn},
    {n:'Audit',v:u.audit.kokku,e:u.audit.eesmark,t:u.audit.tn},
    {n:'Rexon Eye',v:u.rexon.kokku,e:u.rexon.eesmark,t:u.rexon.tn},
    {n:'Online broneeringud',v:b.online_kokku.kokku,e:b.online_kokku.eesmark,t:b.online_kokku.tn},
    {n:'Lilia konesest',v:b.lilia_kone.kokku,e:b.lilia_kone.eesmark,t:b.lilia_kone.tn},
  ].map(g=>{const pv=pn(g.t);const ok=pv!=null?(pv>=75?'Hea':pv>=50?'Tahelepanu':'Oht'):'-';return `<tr><td>${g.n}</td><td>${f(g.v)}</td><td>${f(g.e)}</td><td>${g.t!=null?`<span class="pill ${pc(g.t)}">${f(g.t,true)}</span>`:'-'}</td><td style="font-size:12px;color:#888">${ok}</td></tr>`;}).join('');

  document.getElementById('main').innerHTML=`
    <div class="sec">Peamised KPI-d</div>
    <div class="kpi-grid">${kpiHtml(d)}</div>
    <div class="sec">Graafikud</div>
    <div class="row">
      <div class="card"><h3>Flow protseduurid nadalate kaupa</h3><div class="cw"><canvas id="c1" role="img" aria-label="Flow protseduurid"></canvas></div><div class="leg"><span><span class="dot" style="background:#1D9E75"></span>Teostatud</span><span><span class="dot" style="background:#9FE1CB"></span>Broneeritud</span></div></div>
      <div class="card"><h3>Kirja panemise % nadalate kaupa</h3><div class="cw"><canvas id="c2" role="img" aria-label="Kirja %"></canvas></div><div class="leg"><span><span class="dot" style="background:#378ADD"></span>Uldine</span><span><span class="dot" style="background:#1D9E75"></span>PP</span><span><span class="dot" style="background:#E24B4A"></span>Eesmark</span></div></div>
    </div>
    <div class="row">
      <div class="card"><h3>Flow uuringud nadalate kaupa</h3><div class="cw"><canvas id="c3" role="img" aria-label="Flow uuringud"></canvas></div><div class="leg"><span><span class="dot" style="background:#1D9E75"></span>Teostatud</span><span><span class="dot" style="background:#9FE1CB"></span>Broneeritud</span></div></div>
      <div class="card"><h3>Broneeringute allikas</h3><div class="cws"><canvas id="c4" role="img" aria-label="Broneeringute jagunemine"></canvas></div><div class="leg"><span><span class="dot" style="background:#1D9E75"></span>Online</span><span><span class="dot" style="background:#378ADD"></span>Lilia</span><span><span class="dot" style="background:#BA7517"></span>Optod</span><span><span class="dot" style="background:#888780"></span>Teised</span></div></div>
    </div>
    <div class="sec">Optometristide naitajad</div>
    <div class="tc"><h3>Isiklikud tulemused</h3><table><thead><tr><th>Optometrist</th><th>Flow prots.</th><th>Kirja %</th><th>Kirja % PP</th></tr></thead><tbody>${opto}</tbody></table></div>
    <div class="sec">Eesmarkide taitmine</div>
    <div class="tc"><h3>Kuu kokkuvote</h3><table><thead><tr><th>Naitaja</th><th>Tegelik</th><th>Eesmark</th><th>Toenaosus</th><th>Olek</th></tr></thead><tbody>${goals}</tbody></table></div>
    <footer><span style="width:8px;height:8px;border-radius:50%;background:#1d9e75;display:inline-block"></span>Andmed: Google Sheets - uuendatud ${m.andmed_uuendatud||'-'}</footer>`;

  const kd=o.kirja_uldine.naadalad.map(v=>parseFloat(String(v).replace('%',''))||0);
  const kp=o.kirja_pp.naadalad.map(v=>parseFloat(String(v).replace('%',''))||0);
  const ke=kd.map(()=>pn(o.kirja_uldine.eesmark)||65);
  ch.c1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels:wk,datasets:[{label:'Teostatud',data:p.flow_kokku.naadalad,backgroundColor:'#1D9E75',borderRadius:3},{label:'Broneeritud',data:p.flow_broneeritud.naadalad,backgroundColor:'#9FE1CB',borderRadius:3}]},options:cd});
  ch.c2=new Chart(document.getElementById('c2'),{type:'line',data:{labels:wk,datasets:[{label:'Uldine',data:kd,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,.1)',fill:true,tension:.35,pointRadius:4},{label:'PP',data:kp,borderColor:'#1D9E75',tension:.35,pointRadius:4},{label:'Eesmark',data:ke,borderColor:'#E24B4A',borderDash:[5,4],pointRadius:0,fill:false}]},options:{...cd,scales:{...cd.scales,y:{...cd.scales.y,min:0,max:100}}}});
  ch.c3=new Chart(document.getElementById('c3'),{type:'bar',data:{labels:wk,datasets:[{label:'Teostatud',data:u.flow_teostatud.naadalad,backgroundColor:'#1D9E75',borderRadius:3},{label:'Broneeritud',data:b.online.naadalad,backgroundColor:'#9FE1CB',borderRadius:3}]},options:cd});
  ch.c4=new Chart(document.getElementById('c4'),{type:'doughnut',data:{labels:['Online','Lilia','Optod','Teised'],datasets:[{data:[b.online.kokku||0,b.lilia_kone.kokku||0,b.opto.kokku||0,b.teised.kokku||0],backgroundColor:['#1D9E75','#378ADD','#BA7517','#888780'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'62%'}});
}
tabs();load(lk);
</script>
</body>
</html>
